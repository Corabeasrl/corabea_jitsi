services:
    null-stt:
        image: corabea/null-stt:latest
        restart: ${RESTART_POLICY:-unless-stopped}
        expose:
            - '2700'
        networks:
            meet.jitsi:

    prosody:
        environment:
            - CORABEA_CALL_EVENTS_URL
            - CORABEA_CALL_EVENTS_SECRET

    web:
        volumes:
            - ${CONFIG}/web/corabea-logo.png:/usr/share/jitsi-meet/images/corabea-logo.png:Z
            - ${CONFIG}/web/corabea-logo.png:/usr/share/jitsi-meet/images/apple-touch-icon.png:Z
            - ${CONFIG}/web/custom-head.html:/usr/share/jitsi-meet/head.html:Z
            - ${CONFIG}/web/custom-title.html:/usr/share/jitsi-meet/title.html:Z
        labels:
            traefik.enable: "true"
            traefik.docker.network: "traefik"
            traefik.http.routers.jitsi.rule: "Host(`${PUBLIC_DOMAIN}`)"
            traefik.http.routers.jitsi.entrypoints: "websecure"
            traefik.http.routers.jitsi.tls.certresolver: "le"
            traefik.http.services.jitsi.loadbalancer.server.port: "80"
        networks:
            meet.jitsi:
            traefik:

networks:
    traefik:
        external: true
